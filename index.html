<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Artale 表攻 + OOVS</title>
<style>
:root{--bg:#020617;--card:#111827;--card2:#1f2937;--text:#e5e7eb;--muted:#9ca3af;--line:#374151;--blue:#2563eb;--green:#16a34a;--gold:#f59e0b;--input:#020617}*{box-sizing:border-box}body{margin:0;padding:16px;background:linear-gradient(180deg,#172554,#020617 420px);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}.wrap{max-width:1180px;margin:auto}.topbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}.brand h1{margin:0;font-size:26px}.tabs,.btns{display:flex;gap:8px;flex-wrap:wrap}.tabs{margin:10px 0 14px}.card{background:rgba(17,24,39,.94);border:1px solid rgba(148,163,184,.2);border-radius:18px;padding:15px;box-shadow:0 15px 40px rgba(0,0,0,.25);margin-bottom:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.form{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.full{grid-column:1/-1}.recordPanel{background:rgba(2,6,23,.36);border:1px solid rgba(148,163,184,.16);border-radius:14px;padding:12px;margin-bottom:12px}.recordPanel .form{margin-bottom:12px}.recordPanel .btns{gap:6px}.recordPanel button,.mapleBtn{font-size:13px;padding:8px 10px;border-radius:10px}.recordPanel .small{margin-top:8px}label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}input,select,textarea{width:100%;font-size:16px;color:var(--text);background:var(--input);border:1px solid var(--line);border-radius:12px;padding:11px;outline:none}input:focus,select:focus,textarea:focus{border-color:#60a5fa;box-shadow:0 0 0 3px rgba(96,165,250,.15)}button{border:0;border-radius:12px;background:var(--blue);color:white;font-weight:900;font-size:15px;padding:11px 13px;cursor:pointer}button.gray{background:var(--card2);border:1px solid var(--line)}button.green{background:var(--green)}button.gold{background:var(--card2);border:1px solid var(--line);color:white}.title{font-weight:900;margin:0 0 12px}.muted,.small{color:var(--muted);font-size:13px;line-height:1.5}.result,.big{border:1px solid rgba(96,165,250,.35);background:linear-gradient(135deg,rgba(37,99,235,.7),rgba(14,165,233,.22));border-radius:18px;padding:18px;text-align:center}.big.oovs{background:linear-gradient(135deg,rgba(22,163,74,.58),rgba(14,165,233,.16))}.range{font-size:38px;font-weight:950;margin:6px 0}.dpm{font-size:30px;font-weight:950;margin:6px 0}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.stat{background:rgba(31,41,55,.78);border:1px solid rgba(148,163,184,.14);border-radius:14px;padding:12px}.k{font-size:12px;color:var(--muted)}.v{font-size:24px;font-weight:900;margin-top:4px}.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(2,6,23,.35);color:#dbeafe}.check{display:flex;align-items:center;gap:7px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(2,6,23,.45)}input[type=checkbox]{width:20px;height:20px;accent-color:var(--blue)}table{width:100%;border-collapse:collapse;min-width:760px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;white-space:nowrap}th{color:#bfdbfe;background:rgba(37,99,235,.18)}.tableWrap{overflow:auto;border:1px solid rgba(148,163,184,.16);border-radius:14px;background:rgba(2,6,23,.35)}.hidden{display:none!important}.page.hiddenPage{display:none}.pageTab.active{background:var(--blue)}.statInputGrid{display:grid;grid-template-columns:72px 1fr 1fr;gap:9px;align-items:end;background:rgba(2,6,23,.34);border:1px solid rgba(148,163,184,.16);border-radius:14px;padding:12px}.statInputGrid .head{color:var(--muted);font-size:12px;font-weight:800}.statName{font-weight:950;color:#dbeafe;padding-bottom:13px}.mapleBtns{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.mapleBtn{background:var(--card2);border:1px solid var(--line);line-height:1.2}.mapleBtn.active{background:var(--blue);border-color:#60a5fa;color:white}.formula{margin-top:12px;background:rgba(2,6,23,.7);border:1px dashed rgba(148,163,184,.28);border-radius:14px;padding:12px;white-space:pre-wrap;line-height:1.7;font:13px ui-monospace,SFMono-Regular,Menlo,monospace;color:#cbd5e1;overflow:auto}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;border:1px solid #60a5fa;color:#fff;padding:12px 16px;border-radius:14px;z-index:99}.okText{color:#86efac}.dangerText{color:#fca5a5}@media(max-width:900px){.grid{grid-template-columns:1fr}.form{grid-template-columns:1fr}.topbar{flex-direction:column}.range{font-size:28px}.dpm{font-size:26px}.stats{grid-template-columns:1fr 1fr}.v{font-size:22px}.mapleBtns{grid-template-columns:repeat(4,1fr)}.mapleBtn{font-size:12px;padding:7px 4px}}
</style>
</head>
<body>
<div class="wrap">
 <div class="topbar"><div class="brand"><h1>Artale 表攻 + OOVS 換算器</h1></div><div class="btns"><span id="authInfo" class="pill">未登入</span><button id="loginBtn">Google 登入</button><button id="logoutBtn" class="gray hidden">登出</button></div></div>
 <div class="tabs"><button id="tabCalc" class="pageTab active">換算器</button><button id="tabRank" class="pageTab gray hidden">排行榜</button></div>
 <main id="calcPage" class="page">
  <div class="grid">
   <section class="card"><p class="title">表功換算</p>
    <div class="recordPanel"><div class="form"><div><label>角色名稱</label><input id="charName" placeholder="例如：糾結倫"></div><div><label>已儲存角色</label><select id="charRecordSelect"><option value="">選擇角色紀錄</option></select></div></div><div class="btns"><button class="gray" id="saveCharRecord">儲存</button><button class="gray" id="loadCharRecord">載入</button><button class="gray" id="deleteCharRecord">刪除</button></div><div id="charSaveHint" class="small">未登入：資料只會暫存。登入後會記憶到雲端。</div></div>
    <div class="form">
     <div><label>職業 / 武器</label><select id="weaponType"></select></div><div><label>熟練度</label><select id="mastery"><option value="0.9">4轉 90%</option><option value="0.6">3轉 60%</option><option value="0.8">80%</option><option value="1">100%</option></select></div>
     <div class="full"><label>能力值欄位</label><div class="statInputGrid"><div class="head">屬性</div><div class="head">主屬</div><div class="head">副屬</div><div class="statName">STR</div><input id="strMain" inputmode="decimal" placeholder="主"><input id="strSub" inputmode="decimal" placeholder="副"><div class="statName">DEX</div><input id="dexMain" inputmode="decimal" placeholder="主"><input id="dexSub" inputmode="decimal" placeholder="副"><div class="statName">INT</div><input id="intMain" inputmode="decimal" placeholder="主"><input id="intSub" inputmode="decimal" placeholder="副"><div class="statName">LUK</div><input id="lukMain" inputmode="decimal" placeholder="主"><input id="lukSub" inputmode="decimal" placeholder="副"></div><div class="small">每個屬性會先合成：STR = STR主 + STR副。楓葉祝福只加成主欄，且加成後無條件捨去。</div></div>
     <div><label>武器攻擊力</label><input id="atkWeapon" inputmode="decimal"></div><div><label>手套攻擊力</label><input id="atkGlove" inputmode="decimal"></div><div><label>箭矢 / 子彈攻擊力</label><input id="atkAmmo" inputmode="decimal"></div><div><label>其他攻擊力</label><input id="atkOther" inputmode="decimal"></div>
     <div class="full"><label>套用楓葉祝福</label><div class="mapleBtns" id="blessBtns"><button class="mapleBtn active" data-v="0">不套用</button><button class="mapleBtn" data-v="0.05">Lv10</button><button class="mapleBtn" data-v="0.10">Lv20</button><button class="mapleBtn" data-v="0.15">Lv30</button></div></div>
     <label class="check full"><input id="snow" type="checkbox">雪花：其他攻擊力 +20</label>
    </div><div class="btns"><button id="calcBtn">重新計算</button><button id="applyA" class="green">套用表攻到 A 配置</button><button id="clearCalc" class="gray">清空</button></div>
   </section>
   <aside class="card"><p class="title">換算結果</p><div class="big"><div class="small">表功範圍</div><div id="damageRange" class="range">-</div><div id="calcDetail" class="small">請輸入角色數值</div></div><div class="stats"><div class="stat"><div class="k">最小表攻</div><div id="minResult" class="v">-</div></div><div class="stat"><div class="k">最大表攻</div><div id="maxResult" class="v">-</div></div><div class="stat"><div class="k">總攻擊力</div><div id="atkResult" class="v">-</div></div><div class="stat"><div class="k">平均值</div><div id="avgResult" class="v">-</div></div></div><div id="formula" class="formula"></div></aside>
  </div>
  <div class="grid">
   <section class="card"><p class="title">A 配置 <span class="pill">使用上方角色名稱</span></p><div class="form"><div class="full"><label>輸出模式</label><select id="aMode"></select></div><div><label>Min</label><input id="aMin" inputmode="decimal"></div><div><label>Max</label><input id="aMax" inputmode="decimal"></div><div id="aSkillWrap"><label>技能等級</label><input id="aSkill" inputmode="numeric" value="30"></div><div><label>目標等級</label><input id="aLevel" inputmode="numeric" value="200"></div><div id="aPhoenixWrap"><label>鳳凰等級</label><input id="aPhoenix" inputmode="numeric" value="30"></div><div id="aPrecisionWrap"><label>精準砲擊</label><input id="aPrecision" inputmode="numeric" value="20"></div><label id="aSEWrap" class="check"><input id="aSE" type="checkbox">會心之眼30</label><label id="aSIWrap" class="check"><input id="aSI" type="checkbox">最終極速</label></div><div class="big oovs" style="margin-top:14px"><div class="small">A 總 DPM</div><div id="aDpm" class="dpm">-</div><div id="aDetail" class="small">-</div></div></section>
   <section class="card"><p class="title">B 配置 <span class="pill">可命名儲存比較對象</span></p><div class="recordPanel"><div class="form"><div><label>B 配置名稱</label><input id="bName" placeholder="例如：林俊賊"></div><div><label>已儲存 B 配置</label><select id="bRecordSelect"><option value="">選擇 B 配置紀錄</option></select></div></div><div class="btns"><button class="gray" id="saveBRecord">儲存</button><button class="gray" id="loadBRecord">載入</button><button class="gray" id="deleteBRecord">刪除</button><button class="gray" id="resetB">重置</button></div></div><div class="form"><div class="full"><label>輸出模式</label><select id="bMode"></select></div><div><label>Min</label><input id="bMin" inputmode="decimal"></div><div><label>Max</label><input id="bMax" inputmode="decimal"></div><div id="bSkillWrap"><label>技能等級</label><input id="bSkill" inputmode="numeric" value="30"></div><div><label>目標等級</label><input id="bLevel" inputmode="numeric" value="200"></div><div id="bPhoenixWrap"><label>鳳凰等級</label><input id="bPhoenix" inputmode="numeric" value="30"></div><div id="bPrecisionWrap"><label>精準砲擊</label><input id="bPrecision" inputmode="numeric" value="20"></div><label id="bSEWrap" class="check"><input id="bSE" type="checkbox">會心之眼30</label><label id="bSIWrap" class="check"><input id="bSI" type="checkbox">最終極速</label></div><div class="big oovs" style="margin-top:14px"><div class="small">B 總 DPM</div><div id="bDpm" class="dpm">-</div><div id="bDetail" class="small">-</div></div></section>
  </div>
  <section class="card"><p class="title">比較結果</p><div class="grid"><div class="result"><div class="small">勝出</div><div id="winner" class="dpm">-</div></div><div class="result"><div class="small">差距</div><div id="gap" class="dpm">-</div></div></div><div class="btns"><button class="gray hidden" id="openRank">查看排行榜</button></div></section>
 </main>
 <main id="rankPage" class="page hiddenPage"><section class="card"><p class="title">線上排行榜</p><div id="rankStatus" class="muted">管理者登入後顯示排行榜</div><div class="tableWrap" style="margin-top:14px"><table><thead><tr><th>排名</th><th>名稱</th><th>模式</th><th>DPM</th><th>Min</th><th>Max</th><th>備註</th><th>時間</th></tr></thead><tbody id="rankBody"><tr><td colspan="8" class="muted">尚無資料</td></tr></tbody></table></div><div class="btns"><button class="gray" id="exportRank">匯出排行榜 JSON</button><button class="gray" id="importRank">匯入排行榜 JSON</button></div><textarea id="rankJsonBox" class="formula hidden" placeholder="排行榜 JSON"></textarea></section></main>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
(()=>{'use strict';
const ADMIN_EMAIL='exl78000@gmail.com', COL='artaleDamageLeaderboard', CHAR_COL='artaleDamageCharacters';
const firebaseConfig={apiKey:'AIzaSyATlIUIlSvtSlbY2mnGZOqNkDdGhR47Yok',authDomain:'artale-damage-calculator-e57cf.firebaseapp.com',projectId:'artale-damage-calculator-e57cf',storageBucket:'artale-damage-calculator-e57cf.firebasestorage.app',messagingSenderId:'8251838682',appId:'1:8251838682:web:396910084706b8a45e55e3',measurementId:'G-1LHDX3SDDW'};
let auth,db,currentUser=null,isAdmin=false,bless=0,lastDamage=null,appliedA=false,rankCache=[],rankUnsub=null,lastRankSig='',charRecords={},loadingChar=false,autoNameTimer=null,tempTimer=null;
const $=id=>document.getElementById(id), raw=id=>$(id)?String($(id).value||'').trim():'', n=id=>{const v=parseFloat(raw(id));return Number.isFinite(v)?v:0}, fmt=x=>Number.isFinite(x)?Math.floor(x).toLocaleString('zh-TW'):'-', chk=id=>!!($(id)&&$(id).checked), set=(id,v)=>{const e=$(id);if(!e)return;e.type==='checkbox'?e.checked=!!v:e.value=(v??'')};
function toast(t){const d=document.createElement('div');d.className='toast';d.textContent=t;document.body.appendChild(d);setTimeout(()=>d.remove(),2200)}
const weapons=[['xbow','弩手 / 弩','DEX','STR',3.6],['bow','弓手 / 弓','DEX','STR',3.4],['gun','槍手 / 火槍','DEX','STR',3.6],['knuckle','拳霸 / 指虎','STR','DEX',4.8],['thief','盜賊 / 拳套短劍','LUK','STR+DEX',3.6],['1hs','單手劍','STR','DEX',4.0],['2hs','雙手劍','STR','DEX',4.6],['spear-stab','槍 / 戳','STR','DEX',5.0],['spear-swing','槍 / 砍','STR','DEX',3.0],['pole-swing','矛 / 砍','STR','DEX',5.0],['pole-stab','矛 / 戳','STR','DEX',3.0]];
const modes=[['nl30','夜使者｜三飛閃30','nl'],['nl20','夜使者｜三飛閃20','nl'],['hero','英雄｜無雙劍舞30','hero'],['palaHoly','聖騎士｜聖劍30','palaH'],['palaFire','聖騎士｜火劍30','palaF'],['sairRF','槍神｜純迅雷','sairRF'],['sairRFOcto','槍神｜迅雷 + 4章魚','sairRFO'],['sairRFOctoPrec','槍神｜迅雷 + 4章魚 + 精準','sairRFOP'],['sairCannon','槍神｜純加農砲','sairC'],['sairCannonOcto','槍神｜加農砲 + 4章魚','sairCO'],['sairCannonOctoPrec','槍神｜加農砲 + 4章魚 + 精準','sairCOP'],['bmStorm','箭神｜純暴風','bm'],['bmPhoenix','箭神｜暴風 + 鳳凰','bmp']];
const store={temp:'artaleDamageTemp.characterRecords',b:'artaleDamageV7.bProfiles'};
function read(k,area=localStorage){try{return JSON.parse(area.getItem(k)||'{}')||{}}catch(e){return{}}}function write(k,v,area=localStorage){area.setItem(k,JSON.stringify(v))}
const charFields=['weaponType','mastery','strMain','strSub','dexMain','dexSub','intMain','intSub','lukMain','lukSub','atkWeapon','atkGlove','atkAmmo','atkOther','snow'];
const bFields=['bName','bMode','bMin','bMax','bSkill','bLevel','bPhoenix','bPrecision','bSE','bSI'];
function getField(id){const e=$(id);return e&&e.type==='checkbox'?chk(id):raw(id)}
function packChar(){const v={};charFields.forEach(id=>v[id]=getField(id));v.bless=bless;return v}
function applyCharValues(v){loadingChar=true;Object.entries(v||{}).forEach(([id,val])=>id==='bless'?bless=Number(val)||0:set(id,val));markBless();calcAll();setTimeout(()=>loadingChar=false,80)}
function charDocId(name){return ((currentUser?.email||'user')+'__'+name).replace(/[\/#?\[\]]/g,'_')}
function fillSelect(id,data,ph){const s=$(id),cur=s.value;s.innerHTML='<option value="">'+ph+'</option>';Object.keys(data).sort((a,b)=>a.localeCompare(b,'zh-Hant')).forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;s.appendChild(o)});if(data[cur])s.value=cur}
function refreshRecords(){fillSelect('charRecordSelect',charRecords,'選擇角色紀錄');fillSelect('bRecordSelect',read(store.b),'選擇 B 配置紀錄')}
async function loadCharRecords(){if(currentUser){charRecords={};try{const snap=await db.collection(CHAR_COL).where('email','==',currentUser.email).get();snap.forEach(doc=>{const d=doc.data();if(d.name)charRecords[d.name]={v:d.values||{},updatedAt:d.updatedAt}})}catch(e){toast('角色紀錄讀取失敗：'+e.message);charRecords={}}}else{charRecords=read(store.temp,sessionStorage)}refreshRecords();autoLoadCharByName(true)}
async function saveChar(silent=false){const name=raw('charName');if(!name){if(!silent)alert('請先輸入角色名稱');return false}const values=packChar();charRecords[name]={v:values,updatedAt:new Date().toISOString()};if(currentUser){try{await db.collection(CHAR_COL).doc(charDocId(name)).set({name,email:currentUser.email,uid:currentUser.uid,values,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});if(!silent)toast('已記憶角色')}catch(e){toast('角色雲端記憶失敗：'+e.message);return false}}else{write(store.temp,charRecords,sessionStorage);if(!silent)toast('已暫存角色')}refreshRecords();charRecordSelect.value=name;return true}
function tempAutoSave(){if(loadingChar||currentUser)return;const name=raw('charName');if(!name)return;clearTimeout(tempTimer);tempTimer=setTimeout(()=>saveChar(true),350)}
function autoLoadCharByName(force=false){const name=raw('charName');if(!name)return;const rec=charRecords[name];if(!rec)return;clearTimeout(autoNameTimer);autoNameTimer=setTimeout(()=>{if(!rec||loadingChar)return;applyCharValues(rec.v||{});charRecordSelect.value=name;if(force)calcAll()},180)}
function loadChar(){const name=raw('charRecordSelect'),rec=charRecords[name];if(!rec)return alert('請先選擇角色紀錄');charName.value=name;applyCharValues(rec.v||{})}
function delChar(){const name=raw('charRecordSelect');if(!name)return;delete charRecords[name];if(currentUser){db.collection(CHAR_COL).doc(charDocId(name)).delete().catch(e=>toast('刪除失敗：'+e.message))}else write(store.temp,charRecords,sessionStorage);refreshRecords();calcAll()}
function saveB(){const name=raw('bName');if(!name)return alert('請先輸入 B 配置名稱');const r=read(store.b),v={};bFields.forEach(id=>v[id]=getField(id));r[name]={v,updatedAt:new Date().toISOString()};write(store.b,r);refreshRecords();bRecordSelect.value=name;toast('已儲存 B 配置')}
function loadB(){const name=raw('bRecordSelect'),rec=read(store.b)[name];if(!rec)return alert('請先選擇 B 配置紀錄');Object.entries(rec.v||{}).forEach(([id,v])=>set(id,v));calcAll()}
function delB(){const name=raw('bRecordSelect');if(!name)return;const r=read(store.b);delete r[name];write(store.b,r);refreshRecords();calcAll()}
function initOptions(){weaponType.innerHTML=weapons.map(w=>`<option value="${w[0]}">${w[1]}：${w[2]} ${w[4]} + ${w[3]}</option>`).join('');aMode.innerHTML=modes.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');bMode.innerHTML=aMode.innerHTML;aMode.value='bmStorm';bMode.value='sairRF'}
function stat(){const main={STR:Math.floor(n('strMain')*(1+bless)),DEX:Math.floor(n('dexMain')*(1+bless)),INT:Math.floor(n('intMain')*(1+bless)),LUK:Math.floor(n('lukMain')*(1+bless))};return{STR:main.STR+n('strSub'),DEX:main.DEX+n('dexSub'),INT:main.INT+n('intSub'),LUK:main.LUK+n('lukSub'),main}}
function statVal(expr,s){return expr.split('+').reduce((a,k)=>a+(s[k.trim()]||0),0)}
function resetDamageResult(){damageRange.textContent='-';calcDetail.textContent='請輸入角色數值';minResult.textContent='-';maxResult.textContent='-';atkResult.textContent='-';avgResult.textContent='-';formula.textContent=''}
function calcDamage(){const w=weapons.find(x=>x[0]===weaponType.value)||weapons[0],s=stat(),main=statVal(w[2],s),sub=statVal(w[3],s),atk=n('atkWeapon')+n('atkGlove')+n('atkAmmo')+n('atkOther')+(chk('snow')?20:0),mas=parseFloat(mastery.value)||.9,max=Math.floor((main*w[4]+sub)*atk/100),min=Math.floor((main*w[4]*.9*mas+sub)*atk/100),avg=Math.floor((min+max)/2);lastDamage={min,max,avg,atk,main,sub,w};if(!(max>0)){resetDamageResult();return lastDamage}damageRange.textContent=`${fmt(min)} ～ ${fmt(max)}`;calcDetail.textContent=`${w[1]}｜實際主屬 ${main}，副屬 ${sub}，總攻擊力 ${atk}`;minResult.textContent=fmt(min);maxResult.textContent=fmt(max);atkResult.textContent=fmt(atk);avgResult.textContent=fmt(avg);formula.textContent=`STR=${s.STR} DEX=${s.DEX} INT=${s.INT} LUK=${s.LUK}\n最大表攻 = (${w[2]} ${main} × ${w[4]} + 副屬 ${sub}) × ${atk} / 100 = ${fmt(max)}\n最小表攻 = (${w[2]} ${main} × ${w[4]} × 0.9 × ${mas} + 副屬 ${sub}) × ${atk} / 100 = ${fmt(min)}`;return lastDamage}
function rf(l){l=Math.max(1,Math.min(30,l||30));return l<=10?100+l*2:l<=20?142+(l-11)*2:182+(l-21)*2}function cannon(l){return Math.min(380,265+((l||30)-1)*5)}function phx(l){l=Math.max(1,Math.min(30,l||30));return l<=10?300+l*5:l<=20?400+(l-10)*5:500+(l-20)*5}
function cfg(p){return{name:p==='a'?raw('charName'):($(p+'Name')?raw(p+'Name'):''),mode:$(p+'Mode').value,min:n(p+'Min'),max:n(p+'Max'),skill:n(p+'Skill')||30,level:n(p+'Level')||200,phoenix:n(p+'Phoenix')||30,precision:n(p+'Precision')||20,se:chk(p+'SE'),si:chk(p+'SI')}}
function oovs(c){let min=c.min,max=c.max;if(!(max>0))return 0;const avg=(min+max)/2,m=c.mode,sk=c.skill,se=c.se,si=c.si;if(m==='bmStorm'||m==='bmPhoenix'){let d=Math.floor(7321100*(avg/5816)*((80+sk)/110));if(m==='bmPhoenix')d+=Math.floor(221528*(phx(c.phoenix)/550));return d}if(m==='nl30'||m==='nl20'){const base=m==='nl30'?5544788:5082638,mul=se?(m==='nl30'?1.53:1.578):1;return Math.floor(base*(avg/4171.5)*mul)}if(m==='hero'){const def=.55*1092.5,sm=2.6+(se?.21:0),hits=si?60000/630:80;return Math.floor((((Math.max(0,min*2.15-def)*sm)+(Math.max(0,max*2.15-def)*sm))/2)*2*hits)}if(m==='palaHoly'||m==='palaFire'){const elem=m==='palaHoly'?1.54:1.98,def=.55*920,sm=7.5+(se?.21:0),hits=si?60000/630:80;return Math.floor((((Math.max(0,min*elem-def)*sm)+(Math.max(0,max*elem-def)*sm))/2)*hits)}if(m.startsWith('sair')){const isC=m.includes('Cannon'),def=.55*1150;let sm=(isC?cannon(sk):rf(sk))+(se?21:0);sm/=100;let hits=isC?(si?(m.includes('Octo')?336:400):(m.includes('Octo')?312:381)):500;let main=Math.floor((((Math.max(0,min-def)*sm)+(Math.max(0,max-def)*sm))/2)*hits);if(m.includes('Prec'))main=Math.floor(main*((110+c.precision)/100));let oct=m.includes('Octo')?Math.floor(3756450*(avg/4828.5)):0;return main+oct}return 0}
function updateMode(p){const m=$(p+'Mode').value;$(p+'PhoenixWrap').style.display=m==='bmPhoenix'?'block':'none';$(p+'PrecisionWrap').style.display=m.includes('Prec')?'block':'none';$(p+'SkillWrap').style.display=(m==='hero'||m==='nl30'||m==='nl20'||m==='palaHoly'||m==='palaFire')?'none':'block';$(p+'SEWrap').style.display=m.startsWith('bm')?'none':'flex';$(p+'SIWrap').style.display=(m.startsWith('bm')||m.startsWith('nl'))?'none':'flex';if(m.startsWith('bm'))$(p+'SE').checked=false;if(m.startsWith('bm')||m.startsWith('nl'))$(p+'SI').checked=false}
function renderOovs(){updateMode('a');updateMode('b');const a=cfg('a'),b=cfg('b'),ad=oovs(a),bd=oovs(b);aDpm.textContent=ad?fmt(ad):'-';bDpm.textContent=bd?fmt(bd):'-';aDetail.textContent=ad?modes.find(x=>x[0]===a.mode)[1]:'-';bDetail.textContent=bd?modes.find(x=>x[0]===b.mode)[1]:'-';if(ad&&bd){const diff=Math.abs(ad-bd),win=ad>=bd?'A':'B';winner.textContent=win;gap.textContent=fmt(diff)}else{winner.textContent='-';gap.textContent='-'}if(appliedA&&ad&&a.name)saveLeaderboard(a,ad)}
function calcAll(){calcDamage();renderOovs();tempAutoSave()}
async function applyToA(){const name=raw('charName');if(!name){alert('請先輸入角色名稱，才可套用到 A 配置');charName.focus();return}const d=calcDamage();if(!d||!(d.max>0))return alert('請先完成表攻換算');aMin.value=d.min;aMax.value=d.max;await saveChar(true);appliedA=true;lastRankSig='';calcAll();toast('已套用到 A 配置，並更新角色資料')}
function resetB(){['bName','bMin','bMax'].forEach(id=>set(id,''));set('bSkill',30);set('bLevel',200);set('bPhoenix',30);set('bPrecision',20);set('bSE',false);set('bSI',false);bMode.value='sairRF';calcAll()}
function clearCalc(){['charName','strMain','strSub','dexMain','dexSub','intMain','intSub','lukMain','lukSub','atkWeapon','atkGlove','atkAmmo','atkOther'].forEach(id=>set(id,''));snow.checked=false;bless=0;markBless();appliedA=false;calcAll()}
function markBless(){document.querySelectorAll('.mapleBtn').forEach(b=>b.classList.toggle('active',parseFloat(b.dataset.v)===bless))}
async function saveLeaderboard(a,dpm){if(!currentUser)return;const modeName=modes.find(x=>x[0]===a.mode)[1],sig=[a.name,a.mode,a.min,a.max,dpm,a.se,a.si].join('|');if(sig===lastRankSig)return;lastRankSig=sig;const id=(a.name+'__'+a.mode).replace(/[\/#?\[\]]/g,'_');await db.collection(COL).doc(id).set({name:a.name,mode:a.mode,modeName,min:Math.floor(a.min),max:Math.floor(a.max),dpm:Math.floor(dpm),note:[a.se?'會心':'',a.si?'最終':''].filter(Boolean).join(' / '),email:currentUser.email,uid:currentUser.uid,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(e=>toast('排行榜寫入失敗：'+e.message))}
function renderRank(){if(!isAdmin){rankBody.innerHTML='<tr><td colspan="8" class="muted">管理者登入後顯示排行榜</td></tr>';return}const arr=rankCache.slice().sort((a,b)=>(b.dpm||0)-(a.dpm||0));rankStatus.textContent='共 '+arr.length+' 筆';rankBody.innerHTML=arr.length?arr.map((r,i)=>`<tr><td>#${i+1}</td><td>${esc(r.name)}</td><td>${esc(r.modeName||r.mode)}</td><td><b>${fmt(r.dpm)}</b></td><td>${fmt(r.min)}</td><td>${fmt(r.max)}</td><td>${esc(r.note||'')}</td><td>${r.updatedAt&&r.updatedAt.toDate?r.updatedAt.toDate().toLocaleString('zh-TW'):''}</td></tr>`).join(''):'<tr><td colspan="8" class="muted">尚無排行榜資料</td></tr>'}
function esc(s){return String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]||c))}
function listenRank(){if(!isAdmin||rankUnsub)return;rankUnsub=db.collection(COL).orderBy('dpm','desc').limit(100).onSnapshot(s=>{rankCache=[];s.forEach(d=>rankCache.push(d.data()));renderRank()},e=>{rankStatus.textContent='讀取失敗：'+e.message})}
function show(page){const r=page==='rank';if(r&&!isAdmin){toast(currentUser?'非管理者無法查看排行榜':'請先使用管理者 Google 登入');return}calcPage.classList.toggle('hiddenPage',r);rankPage.classList.toggle('hiddenPage',!r);tabCalc.classList.toggle('active',!r);tabRank.classList.toggle('active',r);if(r)listenRank();scrollTo({top:0,behavior:'smooth'})}
async function authUI(){isAdmin=!!(currentUser&&currentUser.email===ADMIN_EMAIL);authInfo.textContent=currentUser?(isAdmin?'管理者：':'已登入：')+currentUser.email:'未登入';authInfo.className=isAdmin?'pill okText':'pill';loginBtn.classList.toggle('hidden',!!currentUser);logoutBtn.classList.toggle('hidden',!currentUser);tabRank.classList.toggle('hidden',!isAdmin);openRank.classList.toggle('hidden',!isAdmin);charSaveHint.textContent=currentUser?'已登入：角色資料會記憶到雲端。':'未登入：資料只會自動暫存。';if(!isAdmin&&!rankPage.classList.contains('hiddenPage'))show('calc');await loadCharRecords();if(isAdmin)listenRank();renderRank();calcAll()}
function initFirebase(){firebase.initializeApp(firebaseConfig);auth=firebase.auth();db=firebase.firestore();auth.onAuthStateChanged(u=>{currentUser=u?{email:String(u.email||'').toLowerCase(),uid:u.uid}:null;if(!currentUser&&rankUnsub){rankUnsub();rankUnsub=null;rankCache=[]}authUI()})}
function signIn(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>toast('Google 登入失敗：'+e.message))}
function signOut(){auth.signOut()}
initOptions();refreshRecords();document.addEventListener('input',e=>{if(e.target===charName){autoLoadCharByName(false)}if(e.target.matches('input,select'))setTimeout(calcAll,0)},true);document.addEventListener('change',e=>{if(e.target.matches('input,select'))setTimeout(calcAll,0)},true);document.querySelectorAll('.mapleBtn').forEach(b=>b.onclick=()=>{bless=parseFloat(b.dataset.v)||0;markBless();calcAll()});calcBtn.onclick=calcAll;applyA.onclick=applyToA;clearCalc.onclick=clearCalc;saveCharRecord.onclick=()=>saveChar(false);loadCharRecord.onclick=loadChar;deleteCharRecord.onclick=delChar;charRecordSelect.onchange=loadChar;saveBRecord.onclick=saveB;loadBRecord.onclick=loadB;deleteBRecord.onclick=delB;bRecordSelect.onchange=loadB;resetB.onclick=resetB;tabCalc.onclick=()=>show('calc');tabRank.onclick=()=>show('rank');openRank.onclick=()=>show('rank');loginBtn.onclick=signIn;logoutBtn.onclick=signOut;exportRank.onclick=()=>{rankJsonBox.classList.remove('hidden');rankJsonBox.value=JSON.stringify(rankCache,null,2)};importRank.onclick=async()=>{rankJsonBox.classList.remove('hidden');if(!rankJsonBox.value.trim())return alert('請先貼上 JSON');try{const arr=JSON.parse(rankJsonBox.value);if(!Array.isArray(arr))throw Error('not array');for(const r of arr){const id=((r.name||'')+'__'+(r.mode||r.modeName||'')).replace(/[\/#?\[\]]/g,'_');await db.collection(COL).doc(id).set({...r,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}alert('已匯入排行榜')}catch(e){alert('JSON 錯誤或匯入失敗：'+e.message)}};markBless();loadCharRecords();calcAll();initFirebase();
})();
</script>
