name: Add Google login config

on:
  push:
    paths:
      - .github/workflows/add-google-login.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          old_hint = '      <div id="googleClientHint" class="hidden"></div>'
          new_hint = '''      <div id="googleClientHint" class="authBox hidden">
        <div class="form">
          <div class="full"><label for="googleClientIdInput">Google Client ID</label><input id="googleClientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com"></div>
        </div>
        <div class="btns">
          <button type="button" class="gold" id="saveGoogleClientId">儲存 Google 登入設定</button>
          <button type="button" class="gray" id="clearGoogleClientId">清除設定</button>
        </div>
      </div>'''
          s = s.replace(old_hint, new_hint)

          old_consts = '''  const ADMIN_EMAIL = 'exl78000@gmail.com';
  const GOOGLE_CLIENT_ID = '請填入你的 Google Client ID';
  let currentGoogleUser = null;
  let isAdmin = false;'''
          new_consts = '''  const ADMIN_EMAIL = 'exl78000@gmail.com';
  const GOOGLE_CLIENT_ID = '請填入你的 Google Client ID';
  const GOOGLE_CLIENT_STORAGE = 'artaleDamage.googleClientId';
  let currentGoogleUser = null;
  let isAdmin = false;
  let googleInitClientId = '';
  let googleInitRetryCount = 0;'''
          s = s.replace(old_consts, new_consts)

          old_init = '''  function initGoogleLogin(){
    try{
      const cached = sessionStorage.getItem('artaleGoogleUser');
      if(cached){
        currentGoogleUser = JSON.parse(cached);
        isAdmin = String(currentGoogleUser.email || '').toLowerCase() === ADMIN_EMAIL.toLowerCase();
      }
    }catch(e){}
    const hint = $('googleClientHint');
    const validClientId = GOOGLE_CLIENT_ID && !GOOGLE_CLIENT_ID.includes('請填入') && GOOGLE_CLIENT_ID.includes('.apps.googleusercontent.com');
    if(hint) hint.style.display = validClientId ? 'none' : 'block';
    if(validClientId && window.google && google.accounts && google.accounts.id){
      google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
      google.accounts.id.renderButton($('googleSignInBox'), { theme:'outline', size:'large', text:'signin_with', shape:'pill' });
    }
    updateAuthUI();
  }

  function signOutGoogle(){'''
          new_init = '''  function isValidGoogleClientId(clientId){
    return !!clientId && clientId.includes('.apps.googleusercontent.com') && !clientId.includes('請填入');
  }

  function getGoogleClientId(){
    const baked = String(GOOGLE_CLIENT_ID || '').trim();
    if(isValidGoogleClientId(baked)) return baked;
    try{
      const saved = String(localStorage.getItem(GOOGLE_CLIENT_STORAGE) || '').trim();
      return isValidGoogleClientId(saved) ? saved : '';
    }catch(e){ return ''; }
  }

  function renderGoogleButton(clientId){
    const box = $('googleSignInBox');
    if(!box || !clientId) return false;
    if(!(window.google && google.accounts && google.accounts.id)) return false;
    if(googleInitClientId !== clientId){
      box.innerHTML = '';
      google.accounts.id.initialize({ client_id: clientId, callback: handleGoogleCredential });
      googleInitClientId = clientId;
    }
    if(!box.childElementCount){
      google.accounts.id.renderButton(box, { theme:'outline', size:'large', text:'signin_with', shape:'pill' });
    }
    return true;
  }

  function initGoogleLogin(){
    try{
      const cached = sessionStorage.getItem('artaleGoogleUser');
      if(cached){
        currentGoogleUser = JSON.parse(cached);
        isAdmin = String(currentGoogleUser.email || '').toLowerCase() === ADMIN_EMAIL.toLowerCase();
      }
    }catch(e){}
    const hint = $('googleClientHint');
    const input = $('googleClientIdInput');
    const clientId = getGoogleClientId();
    const validClientId = isValidGoogleClientId(clientId);
    if(input && clientId) input.value = clientId;
    if(hint) hint.style.display = validClientId ? 'none' : 'block';
    if(validClientId && !renderGoogleButton(clientId) && googleInitRetryCount < 20){
      googleInitRetryCount += 1;
      setTimeout(initGoogleLogin, 500);
    }
    updateAuthUI();
  }

  function saveGoogleClientId(){
    const clientId = raw('googleClientIdInput');
    if(!isValidGoogleClientId(clientId)){
      alert('請輸入有效的 Google Client ID');
      if($('googleClientIdInput')) $('googleClientIdInput').focus();
      return;
    }
    try{ localStorage.setItem(GOOGLE_CLIENT_STORAGE, clientId); }catch(e){}
    googleInitClientId = '';
    googleInitRetryCount = 0;
    initGoogleLogin();
  }

  function clearGoogleClientId(){
    try{ localStorage.removeItem(GOOGLE_CLIENT_STORAGE); }catch(e){}
    if($('googleClientIdInput')) $('googleClientIdInput').value = '';
    if($('googleSignInBox')) $('googleSignInBox').innerHTML = '';
    googleInitClientId = '';
    googleInitRetryCount = 0;
    updateAuthUI();
    initGoogleLogin();
  }

  function signOutGoogle(){'''
          s = s.replace(old_init, new_init)

          old_listener = "  $('googleSignOut').addEventListener('click', signOutGoogle);"
          new_listener = "  $('googleSignOut').addEventListener('click', signOutGoogle);\n  $('saveGoogleClientId').addEventListener('click', saveGoogleClientId);\n  $('clearGoogleClientId').addEventListener('click', clearGoogleClientId);"
          s = s.replace(old_listener, new_listener)

          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/add-google-login.yml')
          if wf.exists():
            wf.unlink()
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/add-google-login.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add configurable Google login"
            git push
          fi
