name: Move login to top

on:
  push:
    paths:
      - .github/workflows/move-login-top.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          s = s.replace(
            '.pageTabs{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 4px}',
            '.topBar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.pageTabs{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 4px}'
          )
          s = s.replace(
            '.pageTab.active{background:var(--blue);border-color:rgba(96,165,250,.75)}',
            '.pageTab.active{background:var(--blue);border-color:rgba(96,165,250,.75)}.topAuth{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:flex-end;margin-top:2px}.topAuth .authStatus{font-size:13px;white-space:nowrap}.googleConfig{margin:8px 0 0 auto;max-width:460px}'
          )
          s = s.replace(
            '@media(max-width:900px){.leaderTools{grid-template-columns:1fr}}',
            '@media(max-width:900px){.topBar{display:block}.topAuth{justify-content:flex-start}.googleConfig{margin-left:0}.leaderTools{grid-template-columns:1fr}}'
          )

          old_top = '\n'.join([
            '  <div class="top">',
            '    <h1>Artale 表攻 + OOVS 換算器 v25</h1>',
            '    <div class="pageTabs">',
            '      <button type="button" class="pageTab active" id="tabCalc">換算器</button>',
            '      <button type="button" class="pageTab" id="tabLeaderboard">排行榜</button>',
            '    </div>',
            '  </div>',
          ])
          new_top = '\n'.join([
            '  <div class="top">',
            '    <div class="topBar">',
            '      <div>',
            '        <h1>Artale 表攻 + OOVS 換算器 v25</h1>',
            '        <div class="pageTabs">',
            '          <button type="button" class="pageTab active" id="tabCalc">換算器</button>',
            '          <button type="button" class="pageTab hidden" id="tabLeaderboard">排行榜</button>',
            '        </div>',
            '      </div>',
            '      <div>',
            '        <div class="topAuth">',
            '          <div id="googleSignInBox"></div>',
            '          <button type="button" class="gray" id="googleSignOut" style="display:none">登出</button>',
            '          <span id="authStatus" class="muted authStatus">請先登入</span>',
            '        </div>',
            '        <div id="googleClientHint" class="authBox googleConfig hidden">',
            '          <div class="form">',
            '            <div class="full"><label for="googleClientIdInput">Google Client ID</label><input id="googleClientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com"></div>',
            '          </div>',
            '          <div class="btns">',
            '            <button type="button" class="gold" id="saveGoogleClientId">儲存 Google 登入設定</button>',
            '            <button type="button" class="gray" id="clearGoogleClientId">清除設定</button>',
            '          </div>',
            '        </div>',
            '      </div>',
            '    </div>',
            '  </div>',
          ])
          if old_top not in s:
            raise SystemExit('top block not found')
          s = s.replace(old_top, new_top)

          old_lb_auth = '\n'.join([
            '      <div class="authBox">',
            '        <div class="authRow">',
            '          <div id="googleSignInBox"></div>',
            '          <button type="button" class="gray" id="googleSignOut" style="display:none">登出</button>',
            '          <span id="authStatus" class="muted">請先登入</span>',
            '        </div>',
            '      </div>',
            '      <div id="googleClientHint" class="authBox hidden">',
            '        <div class="form">',
            '          <div class="full"><label for="googleClientIdInput">Google Client ID</label><input id="googleClientIdInput" type="text" placeholder="xxxxx.apps.googleusercontent.com"></div>',
            '        </div>',
            '        <div class="btns">',
            '          <button type="button" class="gold" id="saveGoogleClientId">儲存 Google 登入設定</button>',
            '          <button type="button" class="gray" id="clearGoogleClientId">清除設定</button>',
            '        </div>',
            '      </div>',
          ])
          s = s.replace(old_lb_auth + '\n', '')

          s = s.replace(
            "    const locked = $('leaderboardLocked');\n",
            "    const locked = $('leaderboardLocked');\n    const tabLeaderboard = $('tabLeaderboard');\n    const openLeaderboard = $('openLeaderboard');\n    if(tabLeaderboard) tabLeaderboard.classList.toggle('hidden', !isAdmin);\n    if(openLeaderboard) openLeaderboard.classList.toggle('hidden', !isAdmin);\n"
          )
          s = s.replace(
            "    if(isRank && currentGoogleUser && !isAdmin){\n      alert('非管理者無法查看排行榜');\n      isRank = false;\n    }",
            "    if(isRank && !isAdmin){\n      alert(currentGoogleUser ? '非管理者無法查看排行榜' : '請先用管理者帳號登入');\n      isRank = false;\n    }"
          )

          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Move Google login to header"
            git push
          fi
